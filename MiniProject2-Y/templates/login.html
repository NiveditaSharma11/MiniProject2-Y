<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Smart Energy AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 32px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #0f1e30;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 36px;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
      text-align: center;
    }

    .card .subtitle {
      font-size: 13px;
      color: #475569;
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: #080f1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #38bdf8; }
    .field input::placeholder { color: #334155; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #080f1a;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #334155;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    /* GOOGLE BUTTON */
    .btn-google {
      width: 100%;
      padding: 12px;
      background: #fff;
      border: none;
      border-radius: 8px;
      color: #1f2937;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover { opacity: 0.92; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* FEEDBACK MESSAGES */
    .feedback {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
    }
    .feedback.show { display: flex; }
    .feedback.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .feedback.success {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: #34d399;
    }
    .feedback.loading {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      color: #38bdf8;
    }
    .feedback-icon { font-size: 16px; flex-shrink: 0; }

    .demo-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #475569;
      text-align: center;
      line-height: 1.7;
    }
    .demo-box span { color: #94a3b8; font-weight: 600; }

    .back-link {
      margin-top: 20px;
      font-size: 13px;
      color: #475569;
      text-align: center;
    }
    .back-link a { color: #38bdf8; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo">⚡ Smart Energy AI</div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access the grid forecasting dashboard</p>

    <!-- GOOGLE SIGN-IN -->
    <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
      <!-- Google "G" logo SVG -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with credentials</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Sign In →</button>

    <!-- Auth feedback -->
    <div class="feedback loading" id="feedbackLoading">
      <span class="feedback-icon">⏳</span>
      <span>Authenticating...</span>
    </div>
    <div class="feedback success" id="feedbackSuccess">
      <span class="feedback-icon">✅</span>
      <span id="successMsg">Login successful! Redirecting...</span>
    </div>
    <div class="feedback error" id="feedbackError">
      <span class="feedback-icon">❌</span>
      <span id="errorMsg">Invalid credentials. Please try again.</span>
    </div>

    <div class="demo-box">
      Demo credentials<br>
      Username: <span>admin</span> &nbsp;·&nbsp; Password: <span>admin123</span>
    </div>
  </div>

  <div class="back-link">
    <a href="/">← Back to home</a>
  </div>

  <!-- ── FIREBASE JS SDK (v9 compat — official CDN) ───────────────────────── -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  // ── Firebase web config (injected server-side from .env) ──────────────────
  const firebaseConfig = {
    apiKey:            "{{ firebase_api_key }}",
    authDomain:        "{{ firebase_auth_domain }}",
    projectId:         "{{ firebase_project_id }}",
    storageBucket:     "{{ firebase_storage_bucket }}",
    messagingSenderId: "{{ firebase_messaging_sender_id }}",
    appId:             "{{ firebase_app_id }}",
    measurementId:     "{{ firebase_measurement_id }}"
  };

  // Only initialize if config values are real (not placeholder strings)
  const firebaseReady = (
    firebaseConfig.apiKey &&
    !firebaseConfig.apiKey.startsWith("your_") &&
    firebaseConfig.apiKey !== ""
  );

  if (firebaseReady) {
    firebase.initializeApp(firebaseConfig);
  } else {
    // Hide Google button when Firebase is not configured
    document.getElementById("googleBtn").style.display = "none";
    document.querySelector(".divider").style.display = "none";
  }

  // ── Shared helpers ─────────────────────────────────────────────────────────
  function showFeedback(type, message) {
    document.getElementById("feedbackLoading").classList.remove("show");
    document.getElementById("feedbackSuccess").classList.remove("show");
    document.getElementById("feedbackError").classList.remove("show");

    if (type === "loading") {
      document.getElementById("feedbackLoading").classList.add("show");
    } else if (type === "success") {
      document.getElementById("successMsg").innerText = message;
      document.getElementById("feedbackSuccess").classList.add("show");
    } else if (type === "error") {
      document.getElementById("errorMsg").innerText = message;
      document.getElementById("feedbackError").classList.add("show");
    }
  }

  function redirectAfterLogin(name) {
    const display = name ? `Welcome, ${name}! Redirecting...` : "Login successful! Redirecting...";
    showFeedback("success", display);
    setTimeout(() => { window.location.href = "/predict_page"; }, 900);
  }

  // ── Google Sign-In ─────────────────────────────────────────────────────────
  async function signInWithGoogle() {
    if (!firebaseReady) {
      showFeedback("error", "Google login is not configured. Use username/password instead.");
      return;
    }

    const btn = document.getElementById("googleBtn");
    btn.disabled = true;
    showFeedback("loading");

    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope("email");
      provider.addScope("profile");

      const result = await firebase.auth().signInWithPopup(provider);
      const idToken = await result.user.getIdToken();

      // Send Firebase ID token to our Flask backend for verification
      const res = await fetch("/api/firebase-auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idToken })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        if (data.name) localStorage.setItem("user_name", data.name);
        redirectAfterLogin(data.name);
      } else {
        showFeedback("error", data.error || "Google login failed. Please try again.");
      }
    } catch (err) {
      if (err.code === "auth/popup-closed-by-user") {
        showFeedback("error", "Sign-in popup was closed. Please try again.");
      } else if (err.code === "auth/popup-blocked") {
        showFeedback("error", "Popup blocked by browser. Please allow popups for this site.");
      } else {
        showFeedback("error", "Google sign-in failed: " + (err.message || "Unknown error"));
      }
    } finally {
      btn.disabled = false;
    }
  }

  // ── Username / Password Login ──────────────────────────────────────────────
  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    showFeedback(null);

    if (!username || !password) {
      showFeedback("error", "Please enter both username and password.");
      return;
    }

    btn.disabled = true;
    showFeedback("loading");

    fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      if (data.token) {
        localStorage.setItem("token", data.token);
        redirectAfterLogin(username);
      } else {
        showFeedback("error", data.error || "Invalid credentials. Please try again.");
      }
    })
    .catch(() => {
      btn.disabled = false;
      showFeedback("error", "Server error. Please check your connection and try again.");
    });
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>

</body>
</html>
