<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Weather Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:34px;
}

.weather-container{
display:flex;
justify-content:space-around;
margin-bottom:40px;
}

.card{
background:linear-gradient(135deg,#06b6d4,#3b82f6);
padding:20px;
border-radius:15px;
width:200px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card h2{
margin-top:10px;
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
width:90%;
margin:auto;
}

.chart-box{
background:#0f172a;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

canvas{
width:100%;
}

</style>

</head>

<body>

<h1>Weather Intelligence — {{city}}</h1>

<div style="text-align:center;margin-bottom:30px;">

</div>

<div class="weather-container">

<div class="card">
<h3>City</h3>
<h2>{{city}}</h2>
</div>

<div class="card">
<h3>Temperature</h3>
<h2>{{temperature}} °C</h2>
</div>

<div class="card">
<h3>Humidity</h3>
<h2>{{humidity}} %</h2>
</div>

<div class="card">
<h3>Wind Speed</h3>
<h2>{{wind}} m/s</h2>
</div>

</div>

<div class="chart-grid">

<div class="chart-box">
<canvas id="tempChart"></canvas>
</div>

<div class="chart-box">
<canvas id="humidityChart"></canvas>
</div>

<div class="chart-box">
<canvas id="radarChart"></canvas>
</div>

<div class="chart-box">
<canvas id="demandChart"></canvas>
</div>

</div>

<script>

async function loadWeatherData(){

    let city = "{{city}}";

    const res = await fetch(`/api/weather-data?city=${city}`);
    const data = await res.json();

    if(data.error){
        console.log(data.error);
        return;
    }

    /* UPDATE CARDS */

    document.querySelectorAll(".card h2")[1].innerText = data.temperature + " °C";
    document.querySelectorAll(".card h2")[2].innerText = data.humidity[3] + " %";
    document.querySelectorAll(".card h2")[3].innerText = data.wind + " m/s";

    const labels = ["Morning","Noon","Evening","Night"];

    /* TEMPERATURE CHART */

    new Chart(document.getElementById("tempChart"), {
        type:"line",
        data:{
            labels:labels,
            datasets:[{
                label:"Temperature Trend",
                data:data.temps,
                borderColor:"#38bdf8",
                fill:true
            }]
        }
    });

    /* HUMIDITY CHART */

    new Chart(document.getElementById("humidityChart"), {
        type:"bar",
        data:{
            labels:labels,
            datasets:[{
                label:"Humidity Trend",
                data:data.humidity,
                backgroundColor:"#0ea5e9"
            }]
        }
    });

    /* RADAR CHART */

    new Chart(document.getElementById("radarChart"), {
        type:"radar",
        data:{
            labels:["Temperature","Humidity","Wind","Clouds","Pressure"],
            datasets:[{
                label:"Weather Impact",
                data:[
                    data.temperature,
                    data.humidity[3],
                    data.wind,
                    data.clouds,
                    100
                ],
                backgroundColor:"rgba(99,102,241,0.25)",
                borderColor:"#6366f1"
            }]
        }
    });

    /* DEMAND VS TEMP */

    new Chart(document.getElementById("demandChart"), {
        type:"line",
        data:{
            labels:labels,
            datasets:[
                {
                    label:"Temperature",
                    data:data.temps,
                    borderColor:"#38bdf8"
                },
                {
                    label:"Energy Demand",
                    data:data.demand,
                    borderColor:"#6366f1"
                }
            ]
        }
    });

}

loadWeatherData();

</script>

</body>
</html>
