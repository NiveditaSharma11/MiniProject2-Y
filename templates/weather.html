<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Weather Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:34px;
}

.weather-container{
display:flex;
justify-content:space-around;
margin-bottom:40px;
}

.card{
background:linear-gradient(135deg,#06b6d4,#3b82f6);
padding:20px;
border-radius:15px;
width:200px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card h2{
margin-top:10px;
}

.chart-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
width:90%;
margin:auto;
}

.chart-box{
background:#0f172a;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

canvas{
width:100%;
}

</style>

</head>

<body>

<h1>Weather Intelligence — {{city}}</h1>

<div style="text-align:center;margin-bottom:30px;">

</div>

<div class="weather-container">

<div class="card">
<h3>City</h3>
<h2>{{city}}</h2>
</div>

<div class="card">
<h3>Temperature</h3>
<h2>{{temperature}} °C</h2>
</div>

<div class="card">
<h3>Humidity</h3>
<h2>{{humidity}} %</h2>
</div>

<div class="card">
<h3>Wind Speed</h3>
<h2>{{wind}} m/s</h2>
</div>

</div>

<div class="chart-grid">

<div class="chart-box">
<canvas id="tempChart"></canvas>
</div>

<div class="chart-box">
<canvas id="humidityChart"></canvas>
</div>

<div class="chart-box">
<canvas id="radarChart"></canvas>
</div>

<div class="chart-box">
<canvas id="demandChart"></canvas>
</div>

</div>

<script>
const tempData = JSON.parse('{{ temps | tojson }}');
const humidityData = JSON.parse('{{ humidity_trend | tojson }}');
const demandData = JSON.parse('{{ demand | tojson }}');

const labels = ["Morning","Noon","Evening","Night"];

new Chart(
document.getElementById("tempChart"),
{
type:"line",
data:{
labels:labels,
datasets:[{

label:"Temperature Trend",

data:tempData,

borderColor:"#38bdf8",

backgroundColor:"rgba(56,189,248,0.2)",

fill:true,

tension:0.4

}]
}
}
);

new Chart(
document.getElementById("humidityChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{

label:"Humidity Trend",

data:humidityData,

backgroundColor:"#0ea5e9"

}]
}
}
);

new Chart(
document.getElementById("radarChart"),
{
type:"radar",
data:{
labels:["Temperature","Humidity","Wind","Clouds","Pressure"],
datasets:[{

label:"Weather Impact",

data:[70,60,40,50,45],

backgroundColor:"rgba(99,102,241,0.25)",

borderColor:"#6366f1"

}]
}
}
);

new Chart(
document.getElementById("demandChart"),
{
type:"line",
data:{
labels:labels,
datasets:[
{
label:"Temperature",
data:tempData,
borderColor:"#38bdf8",
fill:false
},
{
label:"Energy Demand",
data:demandData,
borderColor:"#6366f1",
fill:false
}
]
}
}
);

</script>

</body>
</html>
