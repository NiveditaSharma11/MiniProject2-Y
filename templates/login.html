<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Smart Energy AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080f1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 32px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #0f1e30;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 36px;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
      text-align: center;
    }

    .card .subtitle {
      font-size: 13px;
      color: #475569;
      text-align: center;
      margin-bottom: 28px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: #080f1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: #38bdf8; }
    .field input::placeholder { color: #334155; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #080f1a;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    /* FEEDBACK MESSAGES */
    .feedback {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
    }
    .feedback.show { display: flex; }
    .feedback.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
    }
    .feedback.success {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      color: #34d399;
    }
    .feedback.loading {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      color: #38bdf8;
    }
    .feedback-icon { font-size: 16px; flex-shrink: 0; }

    .demo-box {
      margin-top: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #475569;
      text-align: center;
      line-height: 1.7;
    }
    .demo-box span { color: #94a3b8; font-weight: 600; }

    .back-link {
      margin-top: 20px;
      font-size: 13px;
      color: #475569;
      text-align: center;
    }
    .back-link a { color: #38bdf8; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo">⚡ Smart Energy AI</div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access the grid forecasting dashboard</p>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Sign In →</button>

    <!-- Auth feedback — clearly visible -->
    <div class="feedback" id="feedbackLoading">
      <span class="feedback-icon">⏳</span>
      <span>Authenticating...</span>
    </div>
    <div class="feedback" id="feedbackSuccess">
      <span class="feedback-icon">✅</span>
      <span id="successMsg">Login successful! Redirecting to dashboard...</span>
    </div>
    <div class="feedback" id="feedbackError">
      <span class="feedback-icon">❌</span>
      <span id="errorMsg">Invalid credentials. Please try again.</span>
    </div>

    <div class="demo-box">
      Demo credentials<br>
      Username: <span>admin</span> &nbsp;·&nbsp; Password: <span>admin123</span>
    </div>
  </div>

  <div class="back-link">
    <a href="/">← Back to home</a>
  </div>

<script>
  function showFeedback(type, message) {
    // Hide all
    document.getElementById("feedbackLoading").classList.remove("show");
    document.getElementById("feedbackSuccess").classList.remove("show");
    document.getElementById("feedbackError").classList.remove("show");

    if (type === "loading") {
      document.getElementById("feedbackLoading").classList.add("show");
    } else if (type === "success") {
      document.getElementById("successMsg").innerText = message;
      document.getElementById("feedbackSuccess").classList.add("show");
    } else if (type === "error") {
      document.getElementById("errorMsg").innerText = message;
      document.getElementById("feedbackError").classList.add("show");
    }
  }

  function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    // Clear previous feedback
    showFeedback(null);

    if (!username || !password) {
      showFeedback("error", "Please enter both username and password.");
      return;
    }

    btn.disabled = true;
    showFeedback("loading");

    fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      if (data.token) {
        localStorage.setItem("token", data.token);
        showFeedback("success", "✅ Login successful! Redirecting to dashboard...");
        setTimeout(() => { window.location.href = "/predict_page"; }, 900);
      } else {
        showFeedback("error", data.error || "Invalid credentials. Please try again.");
      }
    })
    .catch(() => {
      btn.disabled = false;
      showFeedback("error", "Server error. Please check your connection and try again.");
    });
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
</script>

</body>
</html>
